name: CI/CD Zemer Resources

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    name: Build et Test Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image Docker
        run: docker build -t zemer-web .

      - name: Lancer le conteneur
        run: |
          docker run -d \
            -p 8080:80 \
            --name zemer-test \
            zemer-web

      - name: Attendre démarrage
        run: sleep 5

      - name: Tester le site
        run: |
          curl -f http://localhost:8080
          echo "✅ Site répond correctement !"

      - name: Arrêter le conteneur
        run: |
          docker stop zemer-test
          docker rm zemer-test

      - name: Succès
        run: echo "🚀 Pipeline terminé avec succès !"
